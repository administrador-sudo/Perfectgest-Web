# Blueprint Render — pré-cadastro Opção B (PostgreSQL persistente).
# Dashboard → New → Blueprint → repositório Perfectgest-Web.
databases:
  - name: perfectgest-leads-db
    plan: free
    databaseName: perfectgest_leads
    user: perfectgest_leads_user

services:
  - type: web
    name: perfectgest-leads-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: perfectgest-leads-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://perfectgest-web-desenvolvedor-apps.onrender.com
      - key: NODE_VERSION
        value: "20"
